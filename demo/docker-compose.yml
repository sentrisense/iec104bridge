services:
  # ── NATS cluster (3 nodes, JetStream enabled) ────────────────────────────────
  nats1:
    image: nats:latest
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - ./nats/nats1.conf:/etc/nats/nats.conf:ro
      - nats1_data:/data
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring

  nats2:
    image: nats:latest
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - ./nats/nats2.conf:/etc/nats/nats.conf:ro
      - nats2_data:/data

  nats3:
    image: nats:latest
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - ./nats/nats3.conf:/etc/nats/nats.conf:ro
      - nats3_data:/data

  # ── One-shot: create the SENSORS JetStream stream ────────────────────────────
  # Retries until the cluster is elected and JetStream is ready.
  nats-setup:
    image: natsio/nats-box:latest
    depends_on: [nats1, nats2, nats3]
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo 'Waiting for NATS JetStream...'
        until nats --server nats://nats1:4222 stream add SENSORS \
              --subjects='sensors.>' \
              --storage=file \
              --replicas=1 \
              --defaults 2>/dev/null \
          || nats --server nats://nats1:4222 stream info SENSORS 2>/dev/null; do
          echo '  retrying in 2 s...'; sleep 2
        done
        echo 'Stream SENSORS ready'
    restart: "no"

  # ── Publisher: generates IEC-104 JSON messages with live variation ───────────
  publisher:
    build:
      context: publisher
      dockerfile: Dockerfile
    environment:
      NATS_URL: nats://nats1:4222,nats://nats2:4222,nats://nats3:4222
      NATS_SUBJECT: sensors.measurements
      NATS_STREAM: SENSORS
      PUBLISH_INTERVAL: "2.0"
    depends_on:
      nats-setup:
        condition: service_completed_successfully
    restart: on-failure

  # ── IEC-104 bridge ──────────────────────────────────────────────────────────
  bridge:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "2404:2404"   # IEC-104
      - "9091:9091"   # Prometheus metrics
    environment:
      NATS_URL: nats://nats1:4222,nats://nats2:4222,nats://nats3:4222
      NATS_STREAM: SENSORS
      NATS_CONSUMER: iec104bridge
      NATS_SUBJECT_FILTER: sensors.measurements
      IEC104_CA: "1"
      IEC104_PORT: "2404"
      METRICS_PORT: "9091"
      RUST_LOG: iec104bridge=info
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/metrics"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    depends_on:
      nats-setup:
        condition: service_completed_successfully

  # ── InfluxDB v2 ─────────────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: password123
      DOCKER_INFLUXDB_INIT_ORG: demo
      DOCKER_INFLUXDB_INIT_BUCKET: iec104
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: demo-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8086/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # ── IEC-104 scraper → InfluxDB ───────────────────────────────────────────────
  scraper:
    build:
      context: scraper
      dockerfile: Dockerfile
    environment:
      BRIDGE_HOST: bridge
      BRIDGE_PORT: "2404"
      GI_INTERVAL: "5"
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: demo-token
      INFLUXDB_ORG: demo
      INFLUXDB_BUCKET: iec104
    depends_on:
      bridge:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    restart: on-failure

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      bridge:
        condition: service_healthy

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy

volumes:
  nats1_data:
  nats2_data:
  nats3_data:
  influxdb_data:
  prometheus_data:
  grafana_data:
